version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.2
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/graphiti_password
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10

  graphiti-mcp:
    build:
      context: ../../../../tmp/graphiti
      dockerfile: Dockerfile
    image: graphiti-mcp:latest
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=graphiti_password
      - PORT=8000
      - db_backend=neo4j
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-default}
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro

volumes:
  neo4j_data:
