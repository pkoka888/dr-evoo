# Graphiti Configuration
# This file is used by the Graphiti MCP server

llm:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0.0

embedder:
  provider: openai
  model: text-embedding-3-small

database:
  provider: neo4j
  host: neo4j
  port: 7687
  user: neo4j
  password: graphiti_password
  database: neo4j

graphiti:
  group_id: default
  entity_types: []

server:
  transport: http
  host: 0.0.0.0
  port: 8000
